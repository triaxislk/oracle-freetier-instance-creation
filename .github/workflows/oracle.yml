name: Oracle Free Tier Instance Creation

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Oracle CLI
        run: |
          pip install oci-cli

      - name: Configure OCI Credentials
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "${{ secrets.OCI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Create Oracle Instance via OCI CLI
        run: |
          echo "Fetching Availability Domains..."
          TARGET_AD=$(oci iam availability-domain list --compartment-id "${{ secrets.OCI_COMPARTMENT }}" --query "data[0].name" --raw-output)
          echo "Target Availability Domain: $TARGET_AD"

          echo "Fetching Ubuntu ARM Image ID..."
          TARGET_IMAGE_ID=$(oci compute image list --compartment-id "${{ secrets.OCI_COMPARTMENT }}" --shape "VM.Standard.A1.Flex" --operating-system "Canonical Ubuntu" --query "data[0].id" --raw-output)
          echo "Target Image ID: $TARGET_IMAGE_ID"

          echo "Attempting to launch Oracle Ampere VPS..."
          OUTPUT=$(oci compute instance launch \
            --display-name "AlwaysFree-Ampere-VPS" \
            --compartment-id "${{ secrets.OCI_COMPARTMENT }}" \
            --availability-domain "$TARGET_AD" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus": 4, "memoryInGBs": 24}' \
            --image-id "$TARGET_IMAGE_ID" \
            --subnet-id "${{ secrets.OCI_SUBNET }}" \
            --assign-public-ip true 2>&1) || EXIT_CODE=$?

          echo "$OUTPUT"

          if [ -z "$EXIT_CODE" ]; then
            echo "SUCCESS! Oracle Instance Created Successfully."
          elif echo "$OUTPUT" | grep -q "Out of host capacity"; then
            echo "STATUS: Out of host capacity in your region. Will retry in 30 minutes."
          elif echo "$OUTPUT" | grep -q "LimitExceeded"; then
            echo "STATUS: Limit exceeded. You may already have a running instance."
          else
            echo "Error occurred during execution. Please check the log above."
          fi

      - name: Keep Workflow Alive
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"
          git commit --allow-empty -m "Keep-alive commit to prevent workflow suspension"
          git push origin main || echo "No changes to push or push failed"
