name: Oracle Free Tier Instance Creation

on:
  push:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# මෙන්න මේ කොටස අලුතින් එකතු කරන්න
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Oracle Cloud CLI Dependencies
        run: |
          pip install oci

      - name: Create Oracle Instance Directly via API
        env:
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT: ${{ secrets.OCI_COMPARTMENT }}
          OCI_SUBNET: ${{ secrets.OCI_SUBNET }}
          OCI_KEY_CONTENT: ${{ secrets.OCI_KEY_CONTENT }}
        run: |
          python - << 'EOF'
          import os
          import oci

          config = {
              "user": os.environ["OCI_USER"],
              "fingerprint": os.environ["OCI_FINGERPRINT"],
              "tenancy": os.environ["OCI_TENANCY"],
              "region": os.environ["OCI_REGION"],
              "key_content": os.environ["OCI_KEY_CONTENT"]
          }

          compute_client = oci.core.ComputeClient(config)
          identity_client = oci.identity.IdentityClient(config)

          try:
              print("Fetching Availability Domains...")
              ads = identity_client.list_availability_domains(compartment_id=os.environ["OCI_COMPARTMENT"]).data
              target_ad = ads[0].name
              print(f"Target Availability Domain: {target_ad}")

              print("Fetching Ubuntu ARM Image...")
              images = compute_client.list_images(
                  compartment_id=os.environ["OCI_COMPARTMENT"],
                  shape="VM.Standard.A1.Flex",
                  operating_system="Canonical Ubuntu"
              ).data
              target_image_id = images[0].id
              print(f"Target Image ID: {target_image_id}")

              launch_instance_details = oci.core.LaunchInstanceDetails(
                  display_name="AlwaysFree-Ampere-VPS",
                  compartment_id=os.environ["OCI_COMPARTMENT"],
                  shape="VM.Standard.A1.Flex",
                  availability_domain=target_ad,
                  shape_config=oci.core.LaunchInstanceShapeConfigDetails(
                      ocpus=4,
                      memory_in_gbs=24
                  ),
                  source_details=oci.core.InstanceSourceViaImageDetails(
                      source_type="image",
                      image_id=target_image_id
                  ),
                  create_vnic_details=oci.core.CreateVnicDetails(
                      subnet_id=os.environ["OCI_SUBNET"],
                      assign_public_ip=True
                  )
              )

              print("Attempting to create Oracle Ampere VPS...")
              instance = compute_client.launch_instance(launch_instance_details)
              print(f"SUCCESS! Instance created. ID: {instance.data.id}")

          except oci.exceptions.ServiceError as e:
              if e.status == 500 and "Out of host capacity" in e.message:
                  print("STATUS: Out of host capacity in your region. Will retry in next run.")
              elif e.status == 400 and "LimitExceeded" in e.message:
                  print("STATUS: You already have an instance running or reached Free Tier limits.")
              else:
                  print(f"Oracle API Service Error: {e.message}")
          except Exception as e:
              print(f"Unexpected Script Error: {str(e)}")
          EOF
